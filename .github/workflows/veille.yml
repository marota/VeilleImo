name: Veille immo
on:
  schedule:
    - cron: "30 6 */2 * *"      # tous les 2 jours à 06:30 UTC (~08:30 Paris l'été, 07:30 l'hiver)
  workflow_dispatch: {}          # bouton "Run workflow" pour lancer à la main
permissions:
  contents: write                # nécessaire pour committer l'état chaîné
concurrency:
  group: veille
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -r requirements-gha.txt
          python -m playwright install --with-deps chromium
      - name: Run veille
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python run_veille.py --config config.gha.yaml
      - name: Persist state & report
        if: always()
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add data/state_chained.json data/reports 2>/dev/null || true
          git commit -m "veille: état $(date -u +%FT%TZ)" || echo "rien à committer"
          git push || echo "push ignoré"
      - name: Archive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-veille
          path: data/reports/*.html
          if-no-files-found: ignore
